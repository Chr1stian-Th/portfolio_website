# =============================================================================
#  nginx config for the static SPA bundle.
#  - Serves /usr/share/nginx/html
#  - Falls back to index.html for client-side routes
#  - Caches /assets/* aggressively (Vite hashes filenames)
#  - Lets index.html stay fresh so deploys are picked up on next visit
# =============================================================================
server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # gzip
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Hashed assets — cache forever.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Everything else — fall through to index.html for SPA routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the entry document.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
